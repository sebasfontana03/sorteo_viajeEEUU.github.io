<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo - Tabla 300 Números</title>
    <link rel="stylesheet" href="sorteo.css">
</head>
<body>
    <div class="container">
        <h1>🎲 SORTEO - Números 1-300</h1>
        
        <div class="header-actions">
            <button id="btnLimpiar" class="btn-limpiar">🗑️ Limpiar Registros</button>
        </div>

        <!-- PANEL 1: 1-100 -->
        <div class="panel">
            <h2>📋 Panel 1: 1-100</h2>
            <table id="tabla1">
                <tbody id="tablaBody1"></tbody>
            </table>
        </div>

        <!-- PANEL 2: 101-200 -->
        <div class="panel">
            <h2>📋 Panel 2: 101-200</h2>
            <table id="tabla2">
                <tbody id="tablaBody2"></tbody>
            </table>
        </div>

        <!-- PANEL 3: 201-300 -->
        <div class="panel">
            <h2>📋 Panel 3: 201-300</h2>
            <table id="tabla3">
                <tbody id="tablaBody3"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Número <span id="numeroSeleccionado"></span></h3>
            <form id="formDatos">
                <input type="text" id="nombre" placeholder="Nombre *" required>
                <input type="text" id="apellido" placeholder="Apellido *" required>
                <input type="text" id="observacion" placeholder="Observación (opcional)">
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <script src="sorteo.js"></script>
</body>
</html>
